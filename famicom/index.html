<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>famiCom — Communication interne Famiflora</title>
<style>
  :root {
    --bg:#0e1712; --rail:#0c1410; --panel:#131e18; --panel-2:#18241d; --hover:#1e2c24;
    --border:#243228; --ink:#e9f1eb; --soft:#94a89b; --faint:#66786d;
    --brand:#e888bb; --brand-deep:#a63c76; --me:#7a2b57; --them:#211d20; --danger:#d9584f;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,Roboto,Helvetica,Arial,sans-serif;
  }
  * { box-sizing:border-box; }
  html,body { height:100%; }
  body { margin:0; font-family:var(--font); background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased; overflow:hidden; }
  button { font-family:inherit; }

  .app { display:grid; grid-template-columns:74px 1fr; height:100vh; }

  /* ---------- Icône-rail ---------- */
  .rail { background:var(--rail); border-right:1px solid var(--border); display:flex; flex-direction:column; align-items:center; padding:14px 0; gap:6px; }
  .rail .mark { width:44px; height:44px; border-radius:13px; background:linear-gradient(150deg,var(--brand),var(--brand-deep)); display:grid; place-items:center; color:#fff; margin-bottom:8px; }
  .rail .nav-btn { position:relative; width:48px; height:48px; border:none; background:transparent; color:var(--soft); border-radius:14px; display:grid; place-items:center; cursor:pointer; transition:background .14s,color .14s; }
  .rail .nav-btn:hover { background:var(--hover); color:var(--ink); }
  .rail .nav-btn.actif { background:var(--panel-2); color:var(--brand); }
  .rail .nav-btn .pastille { position:absolute; top:6px; right:6px; min-width:17px; height:17px; padding:0 4px; border-radius:999px; background:var(--danger); color:#fff; font-size:10px; font-weight:800; display:grid; place-items:center; }
  .rail .grow { flex:1; }
  .rail .avatar { width:40px; height:40px; border-radius:50%; display:grid; place-items:center; font-size:13px; font-weight:800; color:#fff; }

  /* ---------- Zone principale ---------- */
  .main { overflow:hidden; }
  .vue { height:100vh; display:none; }
  .vue.actif { display:grid; }

  /* ===== ACTUS (feed) ===== */
  .vue-actus { grid-template-rows:auto 1fr; }
  .entete { display:flex; align-items:center; gap:12px; padding:16px 22px; border-bottom:1px solid var(--border); }
  .entete h1 { margin:0; font-size:19px; font-weight:700; letter-spacing:-.01em; flex:1; }
  .entete .sous { color:var(--faint); font-size:12.5px; }
  .btn { border:none; border-radius:11px; padding:9px 15px; font-weight:700; font-size:13.5px; cursor:pointer; display:inline-flex; align-items:center; gap:7px; transition:transform .12s,filter .12s; }
  .btn:hover { transform:translateY(-1px); filter:brightness(1.05); }
  .btn-brand { background:linear-gradient(135deg,#f2a4cd,var(--brand-deep)); color:#06130c; }
  .btn-ghost { background:var(--panel-2); color:var(--ink); }

  .feed-scroll { overflow-y:auto; padding:22px 16px 60px; }
  .feed { max-width:600px; margin:0 auto; display:flex; flex-direction:column; gap:16px; }
  .post { background:var(--panel); border:1px solid var(--border); border-radius:18px; overflow:hidden; }
  .post-tete { display:flex; align-items:center; gap:11px; padding:14px 16px; }
  .post-tete .av { width:42px; height:42px; border-radius:50%; display:grid; place-items:center; font-size:14px; font-weight:800; color:#fff; flex:none; }
  .post-tete .qui { flex:1; line-height:1.25; min-width:0; }
  .post-tete .qui b { font-size:14.5px; font-weight:650; }
  .post-tete .qui .meta { font-size:12px; color:var(--faint); }
  .cat { font-size:10.5px; font-weight:800; letter-spacing:.03em; text-transform:uppercase; padding:2px 8px; border-radius:999px; background:var(--panel-2); color:var(--brand); border:1px solid var(--border); }
  .pin { color:var(--brand); }
  .post-media { height:190px; display:grid; place-items:center; color:rgba(255,255,255,.85); font-size:34px; }
  .post-corps { padding:6px 16px 4px; }
  .post-corps h3 { margin:6px 0 4px; font-size:16px; font-weight:650; }
  .post-corps p { margin:0; color:var(--soft); font-size:14px; line-height:1.5; }
  .post-actions { display:flex; align-items:center; gap:4px; padding:8px 10px 12px; }
  .act { display:inline-flex; align-items:center; gap:7px; background:transparent; border:none; color:var(--soft); font-size:13px; font-weight:600; padding:7px 11px; border-radius:10px; cursor:pointer; transition:background .12s,color .12s; }
  .act:hover { background:var(--hover); color:var(--ink); }
  .act.aime { color:var(--brand); }
  .act svg { width:18px; height:18px; }

  /* ===== MESSAGES (WhatsApp) ===== */
  .vue-messages { grid-template-columns:340px 1fr; }
  .convos { border-right:1px solid var(--border); display:grid; grid-template-rows:auto auto 1fr; overflow:hidden; }
  .convos .entete { border-bottom:1px solid var(--border); }
  .recherche { padding:10px 14px; }
  .recherche input { width:100%; background:var(--panel-2); border:1px solid var(--border); color:var(--ink); border-radius:11px; padding:9px 13px; font-size:13.5px; font-family:inherit; }
  .recherche input::placeholder { color:var(--faint); }
  .convo-liste { overflow-y:auto; }
  .convo { display:flex; align-items:center; gap:12px; padding:11px 15px; cursor:pointer; border-left:3px solid transparent; }
  .convo:hover { background:var(--panel); }
  .convo.actif { background:var(--panel); border-left-color:var(--brand); }
  .convo .av { width:46px; height:46px; border-radius:50%; display:grid; place-items:center; font-size:15px; font-weight:800; color:#fff; flex:none; }
  .convo .txt { flex:1; min-width:0; }
  .convo .txt .l1 { display:flex; justify-content:space-between; gap:8px; }
  .convo .txt b { font-size:14.5px; font-weight:620; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .convo .txt .h { font-size:11.5px; color:var(--faint); flex:none; }
  .convo .txt .apercu { font-size:13px; color:var(--soft); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
  .convo .nonlu { min-width:19px; height:19px; padding:0 5px; border-radius:999px; background:var(--brand); color:#06130c; font-size:11px; font-weight:800; display:grid; place-items:center; }

  .chat { display:grid; grid-template-rows:auto 1fr auto; overflow:hidden; background:linear-gradient(180deg,#0d1611,#0e1712); }
  .chat-tete { display:flex; align-items:center; gap:12px; padding:12px 18px; border-bottom:1px solid var(--border); background:var(--rail); }
  .chat-tete .av { width:40px; height:40px; border-radius:50%; display:grid; place-items:center; font-size:14px; font-weight:800; color:#fff; }
  .chat-tete b { font-size:15px; font-weight:640; }
  .chat-tete .st { font-size:12px; color:var(--faint); }
  .chat-corps { overflow-y:auto; padding:18px 18px 8px; display:flex; flex-direction:column; gap:6px; }
  .jour { text-align:center; margin:8px 0; }
  .jour span { background:var(--panel-2); color:var(--faint); font-size:11.5px; font-weight:700; padding:4px 12px; border-radius:999px; }
  .bulle { max-width:74%; padding:8px 12px; border-radius:14px; font-size:14px; line-height:1.45; position:relative; }
  .bulle .exp { font-size:12px; font-weight:800; margin-bottom:2px; }
  .bulle .t { font-size:10.5px; color:var(--faint); float:right; margin:6px 0 -2px 10px; }
  .bulle.eux { background:var(--them); border:1px solid var(--border); align-self:flex-start; border-bottom-left-radius:5px; }
  .bulle.moi { background:var(--me); align-self:flex-end; border-bottom-right-radius:5px; }
  .bulle.moi .t { color:rgba(255,255,255,.55); }
  .chat-saisie { display:flex; gap:10px; padding:12px 16px; border-top:1px solid var(--border); background:var(--rail); }
  .chat-saisie input { flex:1; background:var(--panel-2); border:1px solid var(--border); color:var(--ink); border-radius:22px; padding:11px 16px; font-size:14px; font-family:inherit; }
  .chat-saisie input::placeholder { color:var(--faint); }
  .chat-saisie input:focus { outline:none; border-color:var(--brand); }
  .envoyer { width:44px; height:44px; border-radius:50%; border:none; background:linear-gradient(135deg,#f2a4cd,var(--brand-deep)); color:#06130c; cursor:pointer; display:grid; place-items:center; flex:none; }

  /* ---------- Composer (modale) ---------- */
  .modal { position:fixed; inset:0; background:rgba(4,10,7,.6); backdrop-filter:blur(4px); display:none; place-items:center; z-index:500; padding:20px; }
  .modal.on { display:grid; }
  .modal-carte { width:min(480px,100%); background:var(--panel); border:1px solid var(--border); border-radius:20px; padding:22px; }
  .modal-carte h2 { margin:0 0 4px; font-size:18px; }
  .modal-carte .note { color:var(--faint); font-size:12.5px; margin-bottom:16px; }
  .modal-carte label { display:block; font-size:11.5px; font-weight:700; letter-spacing:.03em; text-transform:uppercase; color:var(--soft); margin:12px 0 6px; }
  .modal-carte input[type=text], .modal-carte textarea, .modal-carte select { width:100%; background:var(--panel-2); border:1px solid var(--border); color:var(--ink); border-radius:12px; padding:11px 13px; font-size:14px; font-family:inherit; }
  .modal-carte textarea { min-height:110px; resize:vertical; }
  .modal-ligne { display:flex; align-items:center; gap:8px; margin-top:12px; color:var(--soft); font-size:13.5px; }
  .modal-actions { display:flex; justify-content:flex-end; gap:10px; margin-top:20px; }

  .vide { display:grid; place-items:center; height:100%; text-align:center; color:var(--faint); padding:30px; }

  /* ---------- Fée (chargement) — reprise de famiformation ---------- */
  .fee-back { position:fixed; inset:0; z-index:900; background:radial-gradient(circle at 50% 40%,#14261a,#070d09); display:none; align-items:center; justify-content:center; opacity:0; transition:opacity .25s; }
  .fee-back.on { display:flex; opacity:1; }
  .fee-scene { text-align:center; width:min(520px,92vw); }
  .fee-duo { display:flex; align-items:flex-end; justify-content:center; gap:8px; position:relative; }
  .fee-perso { width:min(200px,40vw); height:auto; display:block; animation:feeFlotte 3s ease-in-out infinite; transform-origin:50% 70%; }
  @keyframes feeFlotte { 0%,100%{transform:translateY(0) rotate(-1deg)} 50%{transform:translateY(-9px) rotate(1deg)} }
  .fee-ailes { animation:feeAiles 1.5s ease-in-out infinite; transform-origin:300px 300px; }
  @keyframes feeAiles { 0%,100%{transform:scaleX(1)} 50%{transform:scaleX(.9)} }
  .fee-bras { animation:feeCoup 2s cubic-bezier(.36,.07,.3,1) infinite; transform-origin:340px 342px; }
  @keyframes feeCoup { 0%,40%{transform:rotate(0)} 52%{transform:rotate(-26deg)} 62%{transform:rotate(22deg)} 72%{transform:rotate(-6deg)} 82%,100%{transform:rotate(0)} }
  .fee-halo { animation:feeHalo 2s ease-in-out infinite; transform-origin:405px 247px; }
  @keyframes feeHalo { 0%,45%,100%{opacity:.5;transform:scale(.85)} 62%{opacity:1;transform:scale(1.35)} }
  .fee-yeux { animation:feeCligne 4.5s infinite; transform-origin:300px 232px; }
  @keyframes feeCligne { 0%,94%,100%{transform:scaleY(1)} 97%{transform:scaleY(.1)} }
  .fee-plante { width:min(150px,30vw); height:auto; display:block; }
  .fee-plant { display:none; }
  .fee-plant.on { display:block; animation:feePousse .55s cubic-bezier(.2,1.6,.4,1), feeBalance 3.2s ease-in-out .55s infinite; transform-origin:110px 172px; }
  @keyframes feePousse { from{transform:scale(.15) translateY(20px);opacity:0} to{transform:scale(1) translateY(0);opacity:1} }
  @keyframes feeBalance { 0%,100%{transform:rotate(-1.5deg)} 50%{transform:rotate(1.5deg)} }
  .fee-etincelles { position:absolute; left:52%; top:34%; width:1px; height:1px; }
  .fee-et { position:absolute; width:9px; height:9px; background:#B5D95A; border-radius:2px; box-shadow:0 0 8px rgba(141,198,63,.9); animation:feeVole 1.4s ease-in forwards; }
  @keyframes feeVole { 0%{transform:translate(0,0) scale(.4) rotate(0);opacity:0} 20%{opacity:1} 100%{transform:translate(var(--dx),var(--dy)) scale(1.1) rotate(220deg);opacity:0} }
  .fee-barre { width:min(300px,80%); height:8px; margin:22px auto 0; background:rgba(255,255,255,.14); border-radius:999px; overflow:hidden; }
  .fee-barre span { display:block; height:100%; width:35%; border-radius:999px; background:linear-gradient(90deg,#8DC63F,#1E6B33); animation:feeIndef 1.15s ease-in-out infinite; }
  @keyframes feeIndef { 0%{transform:translateX(-115%)} 100%{transform:translateX(320%)} }
  .fee-txt { margin-top:14px; color:#DCEBD6; font-weight:700; font-size:.95rem; }

  @media (max-width:820px) {
    .app { grid-template-columns:64px 1fr; }
    .vue-messages { grid-template-columns:1fr; }
    .vue-messages.chat-ouvert .convos { display:none; }
    .vue-messages:not(.chat-ouvert) .chat { display:none; }
  }
  @media (prefers-reduced-motion:reduce){ *{animation:none!important;transition:none!important} }
</style>
</head>

      </svg>
      <div class="fee-etincelles" id="feeEt"></div>
      <svg class="fee-plante" viewBox="0 0 220 260" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="pP" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#C97B4A"/><stop offset="1" stop-color="#9C5730"/></linearGradient><linearGradient id="pT" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="#2E7D3B"/><stop offset="1" stop-color="#8DC63F"/></linearGradient></defs>
        <path d="M56 168 L164 168 L152 246 Q 110 254 68 246 Z" fill="url(#pP)"/><rect x="48" y="150" width="124" height="24" rx="7" fill="#D98A57"/><ellipse cx="110" cy="172" rx="52" ry="9" fill="#5C3A21"/>
        <g class="fee-plant"><path d="M110 170 Q 106 118 111 74" stroke="url(#pT)" stroke-width="7.5" stroke-linecap="round" fill="none"/><path d="M110 96 Q 78 76 72 102 Q 92 120 110 96 Z" fill="#8DC63F"/><path d="M111 108 Q 144 88 150 114 Q 129 132 111 108 Z" fill="#A9D454"/><g transform="translate(111,62)"><ellipse cx="-17" cy="0" rx="13" ry="9" fill="#F2A9C4"/><ellipse cx="17" cy="0" rx="13" ry="9" fill="#F2A9C4"/><ellipse cx="0" cy="-16" rx="9" ry="13" fill="#F6BDD2"/><ellipse cx="0" cy="16" rx="9" ry="13" fill="#F6BDD2"/><circle r="9" fill="#E8C46B"/></g></g>
        <g class="fee-plant"><rect x="97" y="90" width="26" height="82" rx="13" fill="#4E9E52"/><path d="M97 126 Q 80 126 80 110 Q 80 102 87 102" stroke="#4E9E52" stroke-width="12" stroke-linecap="round" fill="none"/><path d="M123 138 Q 140 138 140 122 Q 140 114 133 114" stroke="#4E9E52" stroke-width="12" stroke-linecap="round" fill="none"/><ellipse cx="110" cy="84" rx="10" ry="7.5" fill="#F26E7E"/></g>
        <g class="fee-plant"><rect x="102" y="96" width="16" height="74" rx="5" fill="#8A5B36"/><circle cx="110" cy="64" r="40" fill="#2E7D3B"/><circle cx="78" cy="84" r="28" fill="#3C9147"/><circle cx="142" cy="84" r="28" fill="#3C9147"/><circle cx="110" cy="82" r="32" fill="#5EA843"/><circle cx="92" cy="58" r="6" fill="#F2A9C4"/><circle cx="130" cy="66" r="6" fill="#F6BDD2"/></g>
        <g class="fee-plant"><path d="M110 170 Q 108 122 111 76" stroke="url(#pT)" stroke-width="7" stroke-linecap="round" fill="none"/><path d="M110 116 Q 82 104 78 126 Q 96 136 110 116 Z" fill="#3C9147"/><g transform="translate(111,64)" fill="#F4B41A"><ellipse cx="0" cy="-18" rx="6" ry="12"/><ellipse cx="0" cy="18" rx="6" ry="12"/><ellipse cx="-18" cy="0" rx="12" ry="6"/><ellipse cx="18" cy="0" rx="12" ry="6"/><ellipse cx="-13" cy="-13" rx="9" ry="7"/><ellipse cx="13" cy="-13" rx="9" ry="7"/><ellipse cx="-13" cy="13" rx="9" ry="7"/><ellipse cx="13" cy="13" rx="9" ry="7"/></g><circle cx="111" cy="64" r="11" fill="#6E4523"/></g>
        <g class="fee-plant"><path d="M100 170 Q 97 142 104 124 L 118 124 Q 125 142 122 170 Z" fill="#F3E9D6"/><path d="M72 126 Q 82 86 111 86 Q 140 86 150 126 Q 111 138 72 126 Z" fill="#D8483B"/><circle cx="96" cy="110" r="5" fill="#FBEFE0"/><circle cx="120" cy="104" r="6" fill="#FBEFE0"/><circle cx="132" cy="118" r="4" fill="#FBEFE0"/></g>
      </svg>
    </div>
    <div class="fee-barre"><span></span></div>
    <div class="fee-txt" id="feeTxt">Un instant…</div>
  </div>
</div>

<script>
/* ============ Données d'exemple (backend branché ensuite) ============ */
const COULEURS = ["#e0aa46,#b67d24","#54abc2,#2f7d92","#8a78b8,#5a4b86","#34a866,#17603a","#d1727f,#9c4b5a","#5487c2,#2f5a92","#3fae99,#1f7d6b"];
function grad(i){ return "linear-gradient(150deg,"+COULEURS[i%COULEURS.length]+")"; }
function inits(n){ return n.split(" ").map(m=>m[0]).slice(0,2).join("").toUpperCase(); }
function echap(s){ const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }

let POSTS = [
  { auteur:"Direction générale", cat:"Direction", epingle:true, titre:"famiCom devient le canal officiel", texte:"Toute information publiée ici est vérifiée et validée. En cas de doute, c'est famiCom qui fait foi !", temps:"il y a 2 h", aime:24, jaime:false, comm:5, media:"linear-gradient(135deg,#1c6b41,#0e3a22)", emoji:"📣" },
  { auteur:"Service RH", cat:"RH", epingle:false, titre:"Congés d'été : pensez à vos demandes", texte:"Merci de déposer vos demandes de congés pour juillet-août avant le 30 du mois via famiRH.", temps:"il y a 5 h", aime:12, jaime:true, comm:3, media:"", emoji:"" },
  { auteur:"Équipe IT", cat:"IT", epingle:false, titre:"Maintenance des caisses mardi soir", texte:"Une mise à jour aura lieu mardi entre 20h et 22h. Les caisses pourraient être indisponibles quelques minutes.", temps:"hier", aime:8, jaime:false, comm:1, media:"", emoji:"" },
];

let CONVOS = [
  { id:1, groupe:true, nom:"Direction", apercu:"Marie : Réunion déplacée à 15h", h:"14:22", nonlu:2, membres:8 },
  { id:2, groupe:true, nom:"Magasin Anderlecht", apercu:"Thomas : Livraison bien reçue 👍", h:"13:05", nonlu:0, membres:14 },
  { id:3, groupe:false, nom:"Marie Dubois", apercu:"Tu peux valider le planning ?", h:"12:40", nonlu:1, membres:0 },
  { id:4, groupe:true, nom:"Équipe Com", apercu:"Vous : Je publie l'annonce ce soir", h:"11:18", nonlu:0, membres:5 },
  { id:5, groupe:false, nom:"Thomas Laurent", apercu:"Merci beaucoup !", h:"hier", nonlu:1, membres:0 },
];

const MSGS = {
  1:[ {exp:"Marie Dubois",moi:false,t:"14:20",txt:"Bonjour à tous, la réunion de ce jour est déplacée à 15h."},
      {exp:"Marie Dubois",moi:false,t:"14:21",txt:"Merci de prévenir vos équipes 🙏"},
      {moi:true,t:"14:22",txt:"C'est noté, je transmets."} ],
  2:[ {exp:"Thomas",moi:false,t:"13:05",txt:"Livraison bien reçue 👍"} ],
  3:[ {exp:"Marie Dubois",moi:false,t:"12:40",txt:"Tu peux valider le planning de la semaine ?"} ],
  4:[ {exp:"Sophie",moi:false,t:"11:10",txt:"On publie quoi cette semaine ?"},
      {moi:true,t:"11:18",txt:"Je publie l'annonce ce soir 😉"} ],
  5:[ {exp:"Thomas Laurent",moi:false,t:"hier",txt:"Merci beaucoup !"} ],
};

/* ============ Navigation ============ */
const vues = { actus:document.querySelector(".vue-actus"), messages:document.querySelector(".vue-messages") };
document.querySelectorAll(".rail .nav-btn[data-vue]").forEach(b=>{
  b.addEventListener("click",()=>{
    document.querySelectorAll(".rail .nav-btn").forEach(x=>x.classList.remove("actif"));
    b.classList.add("actif");
    Object.values(vues).forEach(v=>v.classList.remove("actif"));
    vues[b.dataset.vue].classList.add("actif");
  });
});

/* ============ Feed (Actus) ============ */
const feed = document.getElementById("feed");
function rendreFeed(){
  const tri = [...POSTS].sort((a,b)=> (b.epingle?1:0)-(a.epingle?1:0));
  feed.innerHTML = tri.map((p,i)=>`
    <article class="post">
      <div class="post-tete">
        <div class="av" style="background:${grad(i+3)}">${inits(p.auteur)}</div>
        <div class="qui"><b>${echap(p.auteur)}</b><div class="meta">${echap(p.temps)}</div></div>
        ${p.epingle?'<span class="pin" title="Épinglé">📌</span>':''}
        <span class="cat">${echap(p.cat)}</span>
      </div>
      ${p.media?`<div class="post-media" style="background:${p.media}">${p.emoji||''}</div>`:''}
      <div class="post-corps"><h3>${echap(p.titre)}</h3><p>${echap(p.texte)}</p></div>
      <div class="post-actions">
        <button class="act ${p.jaime?'aime':''}" data-aime="${i}"><svg viewBox="0 0 24 24" fill="${p.jaime?'currentColor':'none'}" stroke="currentColor" stroke-width="1.7"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 1 0-7.8 7.8l1.1 1L12 21l7.7-7.6 1.1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>${p.aime}</button>
        <button class="act"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7a8.5 8.5 0 0 1-.9-3.8A8.38 8.38 0 0 1 12.5 3 8.38 8.38 0 0 1 21 11.5z"/></svg>${p.comm}</button>
      </div>
    </article>`).join("");
  feed.querySelectorAll("[data-aime]").forEach(b=>b.addEventListener("click",()=>{
    const p=POSTS.find((x)=>x===tri[+b.dataset.aime]); p.jaime=!p.jaime; p.aime+=p.jaime?1:-1; rendreFeed();
  }));
}
rendreFeed();

/* ============ Messages ============ */
const convoListe=document.getElementById("convoListe");
let convoActive=null;
function rendreConvos(filtre=""){
  convoListe.innerHTML = CONVOS.filter(c=>c.nom.toLowerCase().includes(filtre.toLowerCase())).map((c,i)=>`
    <div class="convo ${convoActive===c.id?'actif':''}" data-c="${c.id}">
      <div class="av" style="background:${grad(c.id)}">${c.groupe?'#':inits(c.nom)}</div>
      <div class="txt">
        <div class="l1"><b>${echap(c.nom)}</b><span class="h">${c.h}</span></div>
        <div class="l1"><span class="apercu">${echap(c.apercu)}</span>${c.nonlu?`<span class="nonlu">${c.nonlu}</span>`:''}</div>
      </div>
    </div>`).join("");
  convoListe.querySelectorAll("[data-c]").forEach(el=>el.addEventListener("click",()=>ouvrirConvo(+el.dataset.c)));
}
function ouvrirConvo(id){
  convoActive=id;
  const c=CONVOS.find(x=>x.id===id); c.nonlu=0;
  document.getElementById("chatVide").style.display="none";
  document.getElementById("chatContenu").style.display="grid";
  document.querySelector(".vue-messages").classList.add("chat-ouvert");
  document.getElementById("chatTete").innerHTML=`
    <div class="av" style="background:${grad(c.id)}">${c.groupe?'#':inits(c.nom)}</div>
    <div><b>${echap(c.nom)}</b><div class="st">${c.groupe?c.membres+' membres':'en ligne'}</div></div>`;
  const corps=document.getElementById("chatCorps");
  corps.innerHTML=`<div class="jour"><span>Aujourd'hui</span></div>`+ (MSGS[id]||[]).map(m=>bulle(m,c.groupe)).join("");
  corps.scrollTop=corps.scrollHeight;
  rendreConvos(document.getElementById("rechConvo").value);
  majNonlu();
}
function bulle(m,groupe){
  return `<div class="bulle ${m.moi?'moi':'eux'}">${(!m.moi&&groupe)?`<div class="exp" style="color:#f0a6cd">${echap(m.exp)}</div>`:''}${echap(m.txt)}<span class="t">${m.t}</span></div>`;
}
document.getElementById("chatSaisie").addEventListener("submit",e=>{
  e.preventDefault();
  const inp=document.getElementById("chatInput"); const v=inp.value.trim(); if(!v||!convoActive) return;
  (MSGS[convoActive]=MSGS[convoActive]||[]).push({moi:true,t:"maintenant",txt:v});
  const c=CONVOS.find(x=>x.id===convoActive); c.apercu="Vous : "+v; c.h="maintenant";
  inp.value=""; ouvrirConvo(convoActive);
});
document.getElementById("rechConvo").addEventListener("input",e=>rendreConvos(e.target.value));
function majNonlu(){ const n=CONVOS.reduce((s,c)=>s+c.nonlu,0); const b=document.getElementById("railNonlu"); b.textContent=n; b.style.display=n?'grid':'none'; }
rendreConvos(); majNonlu();

/* ============ Composer ============ */
const modal=document.getElementById("modalPublier");
document.getElementById("btnPublier").addEventListener("click",()=>modal.classList.add("on"));
document.getElementById("pAnnuler").addEventListener("click",()=>modal.classList.remove("on"));
modal.addEventListener("click",e=>{ if(e.target===modal) modal.classList.remove("on"); });
document.getElementById("pPublier").addEventListener("click",()=>{
  const titre=document.getElementById("pTitre").value.trim();
  const texte=document.getElementById("pTexte").value.trim();
  if(!titre||!texte){ alert("Titre et message requis."); return; }
  modal.classList.remove("on");
  feeIndef("La fée publie votre information…");
  setTimeout(()=>{
    POSTS.unshift({ auteur:"Équipe Com", cat:document.getElementById("pCat").value, epingle:document.getElementById("pEpingle").checked, titre, texte, temps:"à l'instant", aime:0, jaime:false, comm:0, media:"", emoji:"" });
    document.getElementById("pTitre").value=""; document.getElementById("pTexte").value=""; document.getElementById("pEpingle").checked=false;
    rendreFeed(); feeHide();
  },1900);
});

/* ============ Fée (chargement) ============ */
const feeBack=document.getElementById("feeBack"), feeTxt=document.getElementById("feeTxt"), feeEt=document.getElementById("feeEt");
let plantes=null, etinc=null, pIdx=-1;
function pousse(){ const all=document.querySelectorAll(".fee-plant"); all.forEach(g=>g.classList.remove("on")); pIdx=(pIdx+1)%all.length; all[pIdx].classList.add("on"); }
function etincelle(){ if(!feeBack.classList.contains("on"))return; const s=document.createElement("span"); s.className="fee-et"; s.style.setProperty("--dx",(60+Math.random()*70)+"px"); s.style.setProperty("--dy",(40+Math.random()*60)+"px"); s.style.left=(Math.random()*14-7)+"px"; feeEt.appendChild(s); setTimeout(()=>s.remove(),1500); }
function feeIndef(txt){ feeTxt.textContent=txt||"Un instant…"; feeBack.classList.add("on"); pIdx=-1; pousse(); plantes=setInterval(pousse,2200); etinc=setInterval(etincelle,650); }
function feeHide(){ feeBack.classList.remove("on"); clearInterval(plantes); clearInterval(etinc); }
</script>
</body>
</html>
